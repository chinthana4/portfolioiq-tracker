databases:
  - name: portfolio-db
    databaseName: portfolio
    user: portfolio_user
    plan: free

services:
  - type: web
    name: portfolio-tracker-api
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://portfolio-tracker-ui.onrender.com

  - type: web
    name: portfolio-tracker-ui
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-tracker-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
